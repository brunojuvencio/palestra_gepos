<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua palestra está pronta | O RH do Futuro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&family=Lora:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --yellow:      #F5B800;
            --yellow-dark: #D9A300;
            --yellow-faint:#FFF8E1;
            --ink:         #0D0D0D;
            --ink-mid:     #4A4A4A;
            --ink-light:   #9A9A9A;
            --paper:       #F6F5F0;
            --white:       #FFFFFF;
            --border:      #E0DFD8;
        }

        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── HEADER ─── */
        .header {
            position: relative;
            z-index: 1;
            padding: 20px 64px;
            border-bottom: 1px solid var(--border);
            background: rgba(246,245,240,0.85);
            backdrop-filter: blur(8px);
        }

        .header img {
            height: 40px;
            width: auto;
            display: block;
        }

        /* ─── PAGE ─── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 64px 32px 80px;
            animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        /* ─── HEADLINE ─── */
        .headline {
            margin-bottom: 40px;
            animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
        }

        .headline-eyebrow {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--ink-light);
            margin-bottom: 10px;
        }

        .headline-primary {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(40px, 5vw, 64px);
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            color: var(--ink);
        }

        .headline-accent {
            background: linear-gradient(90deg, var(--yellow), var(--yellow-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .headline-sub {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: clamp(16px, 2vw, 21px);
            color: var(--ink-mid);
            margin-top: 12px;
            line-height: 1.5;
        }

        /* ─── VIDEO ─── */
        .video-wrap {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 */
            background: var(--ink);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.12), 0 32px 64px rgba(0,0,0,0.14);
            margin-bottom: 40px;
            animation: fadeUp 0.7s 0.16s cubic-bezier(0.22,1,0.36,1) both;
        }

        .video-wrap iframe,
        #yt-player {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* ─── CONSULTANT CARD ─── */
        .consultant-card {
            background: var(--yellow-faint);
            border-radius: 16px;
            border: 1px solid rgba(245,184,0,0.28);
            padding: 28px 32px;
            animation: fadeUp 0.6s 0.22s cubic-bezier(0.22,1,0.36,1) both;
        }

        /* identidade: foto + nome/cargo lado a lado */
        .c-identity {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 18px;
        }

        .c-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 3px solid var(--yellow);
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 0 5px rgba(245,184,0,0.15);
        }

        .c-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
        }

        .c-meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .c-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--ink);
            line-height: 1;
        }

        .c-role {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: var(--ink-light);
        }

        /* frase e botão indentados no eixo do texto */
        .c-phrase {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--ink-mid);
            line-height: 1.65;
            padding-left: 102px;
            margin-bottom: 20px;
        }

        .c-cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-left: 102px;
            background: #25D366;
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(37,211,102,0.30);
            transition: background 0.18s ease, gap 0.18s ease, box-shadow 0.18s ease;
        }

        .c-cta:hover {
            background: #1dbe5c;
            gap: 14px;
            box-shadow: 0 6px 20px rgba(37,211,102,0.40);
        }
        .c-cta svg { flex-shrink: 0; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 640px) {
            .header { padding: 16px 20px; }
            .header img { height: 32px; }
            .page { padding: 40px 20px 64px; }
            .headline-primary { font-size: 38px; }
            .consultant-card { padding: 24px 20px; }
            .c-phrase,
            .c-cta { padding-left: 0; margin-left: 0; }
        }
    </style>
</head>
<body>

<header class="header">
    <img src="Logo Fundace-USP-FEARP-PRETO.png" alt="Fundace USP FEARP">

<div class="page">

    <div class="headline">

        <p class="headline-sub">do papel operacional ao papel estratégico — Prof. Dr. Gilberto Shinyashiki</p>

    <!-- Vídeo -->
    <div class="video-wrap">

    <!-- Card Consultor -->
    <div class="consultant-card">
        <div class="c-identity">

            <div class="c-meta">

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    // ── UTMs e identificadores da URL ──────────────────────────────────────
    (function () {
        const params = new URLSearchParams(window.location.search);
        window._trackMeta = {
            utm_source:   params.get('utm_source')   || null,
            utm_medium:   params.get('utm_medium')   || null,
            utm_campaign: params.get('utm_campaign') || null,
            lead_email:   params.get('email')        || null,
        };
    })();

    // ── Supabase config ────────────────────────────────────────────────────
    const SB_URL   = 'https://hasptpxcyavfdzxtwpws.supabase.co';
    const SB_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhhc3B0cHhjeWF2ZmR6eHR3cHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDA2MTYsImV4cCI6MjA5MTY3NjYxNn0.5TTFlqGtVl9AqWDzPTylquWRB1QdP1YXxPQRGfu5B68';
    const SB_TABLE = 'Base GEPOS';

    // ── Dispatcher de eventos ──────────────────────────────────────────────
    function trackVideoEvent(eventName, percentWatched) {
        const payload = {
            event:           eventName,
            percent_watched: percentWatched,
            video_id:        VIDEO_ID,
            page:            window.location.pathname,
        };
        // Mescla todos os metadados (incluindo nulls para garantir coluna preenchida)
        Object.assign(payload, window._trackMeta);

        console.log('[VideoTracking]', payload);

        // TODO: para enviar também a um webhook externo, adicione um fetch aqui:
        // fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        fetch(SB_URL + '/rest/v1/' + encodeURIComponent(SB_TABLE), {
            method:  'POST',
            headers: {
                apikey:          SB_ANON,
                Authorization:   'Bearer ' + SB_ANON,
                'Content-Type':  'application/json',
                Prefer:          'return=minimal',
            },
            body: JSON.stringify(payload),
        }).catch(function (err) { console.warn('[VideoTracking] Supabase error:', err); });
    }

    // ── Player YouTube IFrame API ──────────────────────────────────────────
    const VIDEO_ID = 'nKPxOrS0NTg';
    const MILESTONES = [25, 50, 75];

    let player, pollInterval;
    let started  = false;
    const fired  = new Set();   // evita disparar o mesmo marco mais de uma vez

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            videoId:     VIDEO_ID,
            playerVars:  { rel: 0, modestbranding: 1, color: 'white' },
            events: {
                onStateChange: onPlayerStateChange,
            },
        });
    }

    function getPct() {
        if (!player || typeof player.getDuration !== 'function') return 0;
        const dur = player.getDuration();
        return dur ? Math.round((player.getCurrentTime() / dur) * 100) : 0;
    }

    function startPolling() {
        if (pollInterval) return;
        pollInterval = setInterval(function () {
            const pct = getPct();

            MILESTONES.forEach(function (m) {
                const key = 'video_progress_' + m;
                if (pct >= m && !fired.has(key)) {
                    fired.add(key);
                    trackVideoEvent(key, pct);
                }
            });

            if (pct >= 95 && !fired.has('video_complete')) {
                fired.add('video_complete');
                trackVideoEvent('video_complete', pct);
                stopPolling();
            }
        }, 1000);
    }

    function stopPolling() {
        clearInterval(pollInterval);
        pollInterval = null;
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            if (!started) {
                started = true;
                trackVideoEvent('video_start', 0);
            }
            startPolling();
        } else if (event.data === YT.PlayerState.PAUSED) {
            stopPolling();
            const pct = getPct();
            if (!fired.has('video_complete')) {
                trackVideoEvent('video_paused', pct);
            }
        } else if (event.data === YT.PlayerState.ENDED) {
            stopPolling();
            if (!fired.has('video_complete')) {
                fired.add('video_complete');
                trackVideoEvent('video_complete', 100);
            }
        }
    }
</script>
